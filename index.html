<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GitHub Firebase Multiplayer - Persona 5 Edition</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }

        /* --- PRE-JOIN MENU OVERLAY --- */
        #setup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 10, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .setup-box {
            background: #1a1a1a;
            border: 2px solid #444;
            padding: 25px;
            border-radius: 8px;
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            text-align: center;
        }
        .setup-box h2 { margin: 0 0 5px 0; color: #e74c3c; font-size: 20px; }
        .setup-box label { font-size: 12px; color: #aaa; text-align: left; }
        .setup-box input, .setup-box select {
            background: #111;
            border: 1px solid #444;
            color: #fff;
            padding: 8px;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        #join-btn {
            background: #e74c3c;
            color: #fff;
            border: none;
            padding: 10px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 5px;
        }
        #join-btn:hover { background: #c0392b; }
        .refresh-note {
            font-size: 11px;
            color: #777;
            margin-top: 10px;
        }

        #top-bar {
            margin-bottom: 6px;
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 13px;
            color: #aaa;
            width: 800px;
            justify-content: space-between;
        }
        #p5-menu-toggle {
            background: #e74c3c;
            color: #fff;
            border: none;
            padding: 4px 12px;
            font-weight: bold;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        #p5-menu-toggle:hover { background: #c0392b; }

        #viewport {
            position: relative;
            width: 800px;
            height: 440px;
            background: #1e3f20;
            border: 3px solid #e74c3c;
            box-shadow: 0 0 25px rgba(231, 76, 60, 0.4);
            overflow: hidden;
        }
        canvas { display: block; }

        /* --- PERSONA 5 OVERLAY MENU & TRANSITION --- */
        #p5-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: flex-end;
            padding-right: 80px;
            box-sizing: border-box;
            transform: skewX(-15deg);
            border-left: 10px solid #e74c3c;
        }
        .p5-menu-content {
            transform: skewX(15deg);
            display: flex;
            flex-direction: column;
            gap: 15px;
            text-align: right;
            width: 320px;
        }
        .p5-title {
            color: #e74c3c;
            font-size: 32px;
            font-weight: 900;
            font-style: italic;
            text-shadow: 3px 3px 0px #fff;
            margin-bottom: 10px;
            border-bottom: 4px solid #fff;
            padding-bottom: 5px;
        }
        .p5-btn {
            background: #000;
            color: #fff;
            border: 3px solid #e74c3c;
            padding: 12px 20px;
            font-size: 18px;
            font-weight: bold;
            font-style: italic;
            cursor: pointer;
            text-align: left;
            transition: 0.1s;
            box-shadow: 4px 4px 0px #e74c3c;
        }
        .p5-btn:hover {
            background: #e74c3c;
            color: #000;
            box-shadow: 4px 4px 0px #fff;
        }
        .p5-credits {
            margin-top: 20px;
            font-size: 12px;
            color: #f1c40f;
            font-style: italic;
            font-weight: bold;
            background: rgba(231, 76, 60, 0.2);
            padding: 8px;
            border: 1px dashed #e74c3c;
        }

        /* Persona 5 Dynamic Swipe Transition Canvas / Overlay */
        #p5-transition-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 200;
            display: none;
        }

        /* Real-World Satellite Map Container */
        #map-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 10;
        }

        /* --- UI OVERLAYS FOR SATELLITE MAP --- */
        #map-ui-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 20;
            display: none;
            flex-direction: column;
            gap: 10px;
            background: rgba(0, 0, 0, 0.85);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #e74c3c;
            width: 220px;
            max-height: 420px;
            overflow-y: auto;
        }
        .ui-section-title { font-size: 12px; font-weight: bold; color: #e74c3c; border-bottom: 1px solid #444; padding-bottom: 3px; margin-bottom: 5px; }
        #online-players-list { font-size: 11px; color: #ddd; display: flex; flex-direction: column; gap: 3px; }
        
        .map-tools {
            display: flex;
            gap: 5px;
        }
        .map-btn {
            flex: 1;
            background: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 6px;
            font-size: 11px;
            border-radius: 3px;
            cursor: pointer;
            text-align: center;
        }
        .map-btn.active { background: #e74c3c; color: #fff; font-weight: bold; }
        .map-btn:hover { background: #444; }

        /* --- MOBILE CONTROLS OVERLAY --- */
        #mobile-controls {
            position: absolute;
            bottom: 15px;
            left: 15px;
            right: 15px;
            display: none;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 30;
            pointer-events: none;
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 45px);
            grid-template-rows: repeat(2, 45px);
            gap: 4px;
            pointer-events: auto;
        }
        .dpad-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .dpad-btn:active { background: rgba(255, 255, 255, 0.5); }
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }

        .action-pad {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        .action-btn {
            width: 55px;
            height: 55px;
            background: rgba(231, 76, 60, 0.3);
            border: 2px solid #e74c3c;
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .action-btn:active { background: rgba(231, 76, 60, 0.7); }

        /* Chat Box Styling */
        #chat-container {
            width: 800px;
            margin-top: 8px;
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            height: 100px;
        }
        #chat-messages {
            flex: 1;
            padding: 6px 8px;
            overflow-y: auto;
            font-size: 12px;
            color: #ddd;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        #chat-form {
            display: flex;
            border-top: 1px solid #444;
        }
        #chat-input {
            flex: 1;
            background: #111;
            border: none;
            padding: 6px 8px;
            color: #fff;
            font-size: 12px;
            outline: none;
        }
        #chat-send {
            background: #444;
            color: #fff;
            border: none;
            padding: 0 14px;
            cursor: pointer;
            font-weight: bold;
        }
        #chat-send:hover { background: #555; }
    </style>
</head>
<body>

    <!-- PRE-JOIN SETUP SCREEN -->
    <div id="setup-overlay">
        <div class="setup-box">
            <h2>Agadir P5 Multiplayer</h2>
            <div>
                <label>Your Name:</label>
                <input type="text" id="setup-name" maxlength="12" placeholder="Enter name...">
            </div>
            <div>
                <label>Avatar Image URL (Optional):</label>
                <input type="text" id="setup-image" placeholder="https://... (or leave blank)">
            </div>
            <div>
                <label>Device Type:</label>
                <select id="setup-device">
                    <option value="pc">PC (Keyboard / WASD)</option>
                    <option value="mobile">Mobile (On-screen Buttons)</option>
                </select>
            </div>
            <button id="join-btn">TAKE YOUR HEART</button>
            <div class="refresh-note">Note: If something doesn't work, click <b>CTRL + F5</b> to hard refresh.</div>
        </div>
    </div>

    <div id="top-bar">
        <span id="display-player-info" style="color: #e74c3c; font-weight: bold;">Player</span>
        <span>⚡ Walk through rooms for P5 style cuts! Press 'E' for Botato.</span>
        <button id="p5-menu-toggle">MENU</button>
    </div>

    <div id="viewport">
        <canvas id="gameCanvas" width="800" height="440"></canvas>
        <canvas id="p5-transition-canvas" width="800" height="440"></canvas>
        
        <!-- PERSONA 5 STYLIZED MENU -->
        <div id="p5-overlay">
            <div class="p5-menu-content">
                <div class="p5-title">TAKE OVER</div>
                <button class="p5-btn" id="p5-resume">▶ RESUME GAME</button>
                <button class="p5-btn" id="p5-restart">🔄 RESTART POSITION</button>
                <div class="p5-credits">
                    ⭐ CREATED BY:<br>
                    <strong>DA BIG MES3ODII</strong>
                </div>
            </div>
        </div>

        <div id="map-container"></div>

        <!-- SATELLITE HUD & ONLINE LIST -->
        <div id="map-ui-overlay">
            <button class="map-btn" id="map-back-btn" style="background: #e74c3c; font-weight: bold; margin-bottom: 5px;">🔙 Back to Rooms</button>
            <div class="ui-section-title">🗺️ Map Tools</div>
            <div class="map-tools">
                <button class="map-btn active" id="tool-move">Walk/Drive</button>
                <button class="map-btn" id="tool-draw">Draw Line</button>
            </div>
            <button class="map-btn" id="clear-drawings" style="margin-top: 5px; background: #c0392b;">Clear All Drawings</button>

            <div class="ui-section-title" style="margin-top: 10px;">🟢 Online in Map (<span id="online-count">0</span>)</div>
            <div id="online-players-list"></div>
        </div>

        <!-- MOBILE TOUCH CONTROLS -->
        <div id="mobile-controls">
            <div class="dpad">
                <div class="dpad-btn" id="btn-up">▲</div>
                <div class="dpad-btn" id="btn-left">◀</div>
                <div class="dpad-btn" id="btn-down">▼</div>
                <div class="dpad-btn" id="btn-right">▶</div>
            </div>
            <div class="action-pad">
                <div class="action-btn" id="btn-interact">E</div>
                <div class="action-btn" id="btn-sprint">RUN</div>
            </div>
        </div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <form id="chat-form">
            <input type="text" id="chat-input" placeholder="Type a chat message or Python code..." autocomplete="off">
            <button type="submit" id="chat-send">Send</button>
        </form>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Load Game Script as a Module -->
    <script type="module" src="game.js"></script>
</body>
</html>
