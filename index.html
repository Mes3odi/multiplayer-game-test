<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persona Grid World</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: #1e1e1e;
            border: 4px solid #333333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #222;
        }
        /* Clean UI Panels (No Red Borders) */
        .ui-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 25, 0.95);
            border: 2px solid #555555;
            padding: 25px;
            border-radius: 8px;
            width: 350px;
            text-align: center;
            display: none;
            z-index: 50;
            box-shadow: 0 8px 25px rgba(0,0,0,0.8);
        }
        .ui-panel h3 {
            margin-bottom: 15px;
            color: #00ffff;
            font-size: 22px;
        }
        .ui-panel p {
            margin-bottom: 20px;
            color: #ccc;
            font-size: 14px;
        }
        .ui-panel button {
            background: #2a2a35;
            color: white;
            border: 1px solid #777;
            padding: 8px 16px;
            margin: 5px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            transition: background 0.2s;
        }
        .ui-panel button:hover {
            background: #00ffff;
            color: #000;
        }

        /* Persona-style Wipe Transition Overlay */
        #transition-overlay {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 100;
            pointer-events: none;
            transition: left 0.35s cubic-bezier(0.77, 0, 0.175, 1);
        }
        #transition-overlay.active {
            left: 0;
        }
        #transition-overlay.slide-out {
            left: 100%;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <!-- Python Terminal UI -->
    <div id="python-ui" class="ui-panel">
        <h3>Python Terminal</h3>
        <p>Run script diagnostics to optimize system data.</p>
        <button onclick="runPythonCode()">Execute Script (+50 pts)</button>
        <button onclick="closeUI()">Close</button>
    </div>

    <!-- Gambling Machine UI -->
    <div id="gambling-ui" class="ui-panel">
        <h3>Gambling Machine</h3>
        <p>Test your fortune! Cost: 10 points.</p>
        <button onclick="spinMachine()">Spin Reels</button>
        <button onclick="closeUI()">Close</button>
    </div>

    <!-- Portal UI / Prompt -->
    <div id="portal-ui" class="ui-panel">
        <h3>Dimensional Portal</h3>
        <p>A swirling vortex of energy. Activate to warp back to Hub?</p>
        <button onclick="usePortal()">Step Through</button>
        <button onclick="closeUI()">Close</button>
    </div>

    <div id="transition-overlay"></div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

/* 
  Room Map Layout Structure:
          [Puzzles Room]
                ^
                |
  [Scoreboard] <-> [Gambling Room]
                         ^
                         |
                   [Central Hub] <---> [Portal Room]
                         |
                         v
                    [Python Room]
*/

const rooms = {
    hub: { 
        name: "Central Hub", 
        bg: "#16161a", 
        up: "gambling", 
        down: "python", 
        left: "portal" 
    },
    portal: { 
        name: "Portal Room", 
        bg: "#0f172a", 
        right: "hub" 
    },
    python: { 
        name: "Python Board Room", 
        bg: "#1e1b4b", 
        up: "hub" 
    },
    gambling: { 
        name: "Gambling Room", 
        bg: "#2e1065", 
        down: "hub", 
        up: "puzzles", 
        left: "scoreboard" 
    },
    puzzles: { 
        name: "Puzzle Room", 
        bg: "#4c0519", 
        down: "gambling" 
    },
    scoreboard: { 
        name: "Scoreboard Room", 
        bg: "#064e3b", 
        right: "gambling" 
    }
};

let currentRoomKey = 'hub';

// Player Object
let player = {
    x: 400,
    y: 300,
    size: 26,
    speed: 4.5,
    color: '#00ffff',
    points: 120
};

// Input State
const keys = {};
window.addEventListener('keydown', e => {
    keys[e.key] = true;
    if (e.key === 'e' || e.key === 'E') {
        checkInteractions();
    }
});
window.addEventListener('keyup', e => keys[e.key] = false);

let activeUI = null;
let transitionActive = false;

function changeRoom(newRoomKey, entrySide) {
    if (transitionActive) return;
    transitionActive = true;
    
    const overlay = document.getElementById('transition-overlay');
    overlay.className = 'active';

    setTimeout(() => {
        currentRoomKey = newRoomKey;
        closeUI();
        
        // Seamless positioning based on entry direction
        if (entrySide === 'left') {
            player.x = 40; player.y = 300;
        } else if (entrySide === 'right') {
            player.x = canvas.width - 40; player.y = 300;
        } else if (entrySide === 'up') {
            player.x = 400; player.y = canvas.height - 40;
        } else if (entrySide === 'down') {
            player.x = 400; player.y = 40;
        } else {
            player.x = 400; player.y = 300;
        }

        overlay.className = 'slide-out';
        setTimeout(() => {
            overlay.className = '';
            transitionActive = false;
        }, 350);
    }, 350);
}

// Room Interaction Triggers
function checkInteractions() {
    if (activeUI) return;
    
    const distToObj = (ox, oy) => Math.hypot(player.x - ox, player.y - oy);

    if (currentRoomKey === 'python' && distToObj(400, 180) < 70) {
        document.getElementById('python-ui').style.display = 'block';
        activeUI = 'python';
    } else if (currentRoomKey === 'gambling' && distToObj(400, 180) < 70) {
        document.getElementById('gambling-ui').style.display = 'block';
        activeUI = 'gambling';
    } else if (currentRoomKey === 'portal' && distToObj(400, 300) < 80) {
        document.getElementById('portal-ui').style.display = 'block';
        activeUI = 'portal';
    }
}

function closeUI() {
    document.querySelectorAll('.ui-panel').forEach(p => p.style.display = 'none');
    activeUI = null;
}

function runPythonCode() {
    player.points += 50;
    alert("Python Script Compiled Successfully! +50 Points.");
    closeUI();
}

function spinMachine() {
    if (player.points < 10) {
        alert("Insufficient points! Earn more via Python or Puzzles.");
        return;
    }
    player.points -= 10;
    const won = Math.random() > 0.4;
    if (won) {
        player.points += 40;
        alert("JACKPOT! Won 40 points!");
    } else {
        alert("No luck this spin. Try again!");
    }
}

function usePortal() {
    changeRoom('hub', 'right');
}

// Main Update Loop
function update() {
    if (!transitionActive && !activeUI) {
        if (keys['ArrowUp'] || keys['w'] || keys['W']) player.y -= player.speed;
        if (keys['ArrowDown'] || keys['s'] || keys['S']) player.y += player.speed;
        if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= player.speed;
        if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += player.speed;

        // Room boundary transitions
        const room = rooms[currentRoomKey];
        if (player.x < 0) {
            if (room.left) changeRoom(room.left, 'right');
            else player.x = 0;
        }
        if (player.x > canvas.width) {
            if (room.right) changeRoom(room.right, 'left');
            else player.x = canvas.width;
        }
        if (player.y < 0) {
            if (room.up) changeRoom(room.up, 'down');
            else player.y = 0;
        }
        if (player.y > canvas.height) {
            if (room.down) changeRoom(room.down, 'up');
            else player.y = canvas.height;
        }
    }
}

// Draw Loop
function draw() {
    const room = rooms[currentRoomKey];
    ctx.fillStyle = room.bg;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Room-specific interactive objects & props
    if (currentRoomKey === 'hub') {
        ctx.fillStyle = '#334155';
        ctx.fillRect(360, 260, 80, 80);
        ctx.fillStyle = '#94a3b8';
        ctx.font = '15px sans-serif';
        ctx.fillText("Central Terminal Hub", 330, 240);
    } 
    else if (currentRoomKey === 'python') {
        ctx.fillStyle = '#38bdf8';
        ctx.fillRect(330, 140, 140, 70);
        ctx.fillStyle = '#ffffff';
        ctx.font = '16px sans-serif';
        ctx.fillText("Python Board [Press E]", 315, 120);
    } 
    else if (currentRoomKey === 'gambling') {
        ctx.fillStyle = '#f43f5e';
        ctx.fillRect(330, 140, 140, 70);
        ctx.fillStyle = '#ffffff';
        ctx.font = '16px sans-serif';
        ctx.fillText("Gambling Machine [Press E]", 295, 120);
    } 
    else if (currentRoomKey === 'puzzles') {
        ctx.fillStyle = '#fbbf24';
        ctx.fillRect(360, 150, 80, 80);
        ctx.fillStyle = '#ffffff';
        ctx.font = '16px sans-serif';
        ctx.fillText("Puzzle Cipher Terminal", 315, 130);
    } 
    else if (currentRoomKey === 'scoreboard') {
        // Scoreboard Room Panel & Display
        ctx.fillStyle = '#065f46';
        ctx.fillRect(200, 120, 400, 280);
        ctx.strokeStyle = '#34d399';
        ctx.lineWidth = 3;
        ctx.strokeRect(200, 120, 400, 280);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 24px sans-serif';
        ctx.fillText("LEADERBOARD & STATS", 270, 170);
        
        ctx.font = '18px sans-serif';
        ctx.fillText(`Player Profile: Active`, 240, 230);
        ctx.fillText(`Total Points: ${player.points}`, 240, 270);
        ctx.fillText(`Current Zone: ${room.name}`, 240, 310);
    } 
    else if (currentRoomKey === 'portal') {
        ctx.fillStyle = '#8b5cf6';
        ctx.beginPath();
        ctx.arc(400, 300, 60, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#c4b5fd';
        ctx.beginPath();
        ctx.arc(400, 300, 40, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.font = '16px sans-serif';
        ctx.fillText("Dimensional Portal [Press E]", 305, 220);
    }

    // Always render player cleanly across all rooms
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x - player.size / 2, player.y - player.size / 2, player.size, player.size);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.strokeRect(player.x - player.size / 2, player.y - player.size / 2, player.size, player.size);
}

function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
