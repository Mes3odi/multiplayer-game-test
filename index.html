<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Firebase Multiplayer - Zelda Rooms, Python Lab & World Map</title>
    <!-- Leaflet CSS for Real World Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #top-bar {
            margin-bottom: 8px;
            display: flex;
            gap: 12px;
            align-items: center;
            font-size: 13px;
            color: #aaa;
        }
        input {
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            outline: none;
        }
        #name-input { width: 110px; }
        #image-input { width: 160px; }

        #viewport {
            position: relative;
            width: 800px;
            height: 440px;
            background: #1e3f20;
            border: 3px solid #555;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }
        canvas {
            display: block;
        }

        /* Real-World Map Container */
        #map-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 10;
        }

        /* Chat Box Styling */
        #chat-container {
            width: 800px;
            margin-top: 8px;
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            height: 110px;
        }
        #chat-messages {
            flex: 1;
            padding: 6px 8px;
            overflow-y: auto;
            font-size: 12px;
            color: #ddd;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        #chat-form {
            display: flex;
            border-top: 1px solid #444;
        }
        #chat-input {
            flex: 1;
            background: #111;
            border: none;
            padding: 6px 8px;
            color: #fff;
            font-size: 12px;
            outline: none;
        }
        #chat-send {
            background: #444;
            color: #fff;
            border: none;
            padding: 0 14px;
            cursor: pointer;
            font-weight: bold;
        }
        #chat-send:hover { background: #555; }
    </style>
</head>
<body>

    <div id="top-bar">
        <span>Name:</span>
        <input type="text" id="name-input" value="Player" maxlength="12">
        <span>Avatar URL:</span>
        <input type="text" id="image-input" placeholder="Optional image link">
        <span style="color: #2ecc71; font-weight: bold;">💡 Walk to the Map Room & enter the portal!</span>
    </div>

    <div id="viewport">
        <canvas id="gameCanvas" width="800" height="440"></canvas>
        <div id="map-container"></div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <form id="chat-form">
            <input type="text" id="chat-input" placeholder="Type a chat message or Python code..." autocomplete="off">
            <button type="submit" id="chat-send">Send</button>
        </form>
    </div>

    <!-- Leaflet JS for Real World Map -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Load Game Script as a Module -->
    <script type="module" src="game.js"></script>
</body>
</html>
