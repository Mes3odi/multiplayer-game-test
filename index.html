<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Persona Grid World</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: #1e1e1e;
            border: 4px solid #333333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            overflow: hidden;
        }
        canvas {
            display: block;
            background: #222;
        }
        /* UI Panels */
        .ui-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 25, 0.95);
            border: 2px solid #555555;
            padding: 25px;
            border-radius: 8px;
            width: 350px;
            text-align: center;
            display: none;
            z-index: 50;
            box-shadow: 0 8px 25px rgba(0,0,0,0.8);
        }
        .ui-panel h3 {
            margin-bottom: 15px;
            color: #00ffff;
            font-size: 22px;
        }
        .ui-panel p {
            margin-bottom: 20px;
            color: #ccc;
            font-size: 14px;
        }
        .ui-panel button {
            background: #2a2a35;
            color: white;
            border: 1px solid #777;
            padding: 8px 16px;
            margin: 5px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            transition: background 0.2s;
        }
        .ui-panel button:hover {
            background: #00ffff;
            color: #000;
        }

        /* Persona-style Wipe Transition Overlay */
        #transition-overlay {
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #000000;
            z-index: 100;
            pointer-events: none;
            transition: left 0.35s cubic-bezier(0.77, 0, 0.175, 1);
        }
        #transition-overlay.active {
            left: 0;
        }
        #transition-overlay.slide-out {
            left: 100%;
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    
    <!-- Python Terminal UI -->
    <div id="python-ui" class="ui-panel">
        <h3>Python Terminal</h3>
        <p>Run script diagnostics to optimize system data.</p>
        <button onclick="runPythonCode()">Execute Script (+50 pts)</button>
        <button onclick="closeUI()">Close</button>
    </div>

    <!-- Gambling Machine UI -->
    <div id="gambling-ui" class="ui-panel">
        <h3>Gambling Machine</h3>
        <p>Test your fortune! Cost: 10 points.</p>
        <button onclick="spinMachine()">Spin Reels</button>
        <button onclick="closeUI()">Close</button>
    </div>

    <!-- Portal UI / Prompt -->
    <div id="portal-ui" class="ui-panel">
        <h3>Dimensional Portal</h3>
        <p>A swirling vortex of energy. Activate to warp back to Hub?</p>
        <button onclick="usePortal()">Step Through</button>
        <button onclick="closeUI()">Close</button>
    </div>

    <div id="transition-overlay"></div>
</div>

<!-- Game Logic File -->
<script src="games.js"></script>

</body>
</html>
