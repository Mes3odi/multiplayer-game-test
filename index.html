<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Firebase Multiplayer - Synced Cinema</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #top-bar {
            margin-bottom: 8px;
            display: flex;
            gap: 10px;
            align-items: center;
            font-size: 13px;
            color: #aaa;
        }
        input, button {
            background: #222;
            border: 1px solid #444;
            color: #fff;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            outline: none;
        }
        #name-input { width: 110px; }
        #image-input { width: 160px; }
        .room-btn {
            background: #333;
            cursor: pointer;
            font-weight: bold;
        }
        .room-btn.active {
            background: #27ae60;
            border-color: #2ecc71;
        }
        .room-btn:hover { background: #444; }

        #viewport {
            position: relative;
            width: 800px;
            height: 440px;
            background: #222;
            border: 2px solid #555;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
        }

        /* Cinema UI Overlay */
        #cinema-screen {
            position: absolute;
            top: 20px;
            left: 150px;
            width: 500px;
            height: 280px;
            background: #000;
            border: 4px solid #333;
            display: none;
        }
        #youtube-player {
            width: 100%;
            height: 100%;
        }
        #cinema-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            display: none;
        }
        #yt-input {
            width: 350px;
            background: #111;
        }

        /* Chat Box Styling */
        #chat-container {
            width: 800px;
            margin-top: 8px;
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            height: 100px;
        }
        #chat-messages {
            flex: 1;
            padding: 6px 8px;
            overflow-y: auto;
            font-size: 12px;
            color: #ddd;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        #chat-form {
            display: flex;
            border-top: 1px solid #444;
        }
        #chat-input {
            flex: 1;
            background: #111;
            border: none;
            padding: 6px 8px;
            color: #fff;
            font-size: 12px;
            outline: none;
        }
        #chat-send {
            background: #444;
            color: #fff;
            border: none;
            padding: 0 12px;
            cursor: pointer;
            font-weight: bold;
        }
        #chat-send:hover { background: #555; }
    </style>
</head>
<body>

    <div id="top-bar">
        <span>Name:</span>
        <input type="text" id="name-input" value="Player" maxlength="12">
        <span>Avatar URL:</span>
        <input type="text" id="image-input" placeholder="Optional image link">
        <span>| Room:</span>
        <button id="btn-game" class="room-btn active">🎮 Game Room</button>
        <button id="btn-cinema" class="room-btn">🍿 Cinema Room</button>
    </div>

    <!-- Viewport holding Canvas or Cinema -->
    <div id="viewport">
        <canvas id="gameCanvas" width="800" height="440"></canvas>
        
        <!-- Cinema Elements -->
        <div id="cinema-screen">
            <div id="youtube-player"></div>
        </div>
        <div id="cinema-controls">
            <input type="text" id="yt-input" placeholder="Paste YouTube link here (e.g. https://youtu.be/...)">
            <button id="yt-set-btn">Play Video</button>
        </div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <form id="chat-form">
            <input type="text" id="chat-input" placeholder="Type a permanent message..." autocomplete="off">
            <button type="submit" id="chat-send">Send</button>
        </form>
    </div>

    <!-- YouTube IFrame API Script -->
    <script src="https://www.youtube.com/iframe_api"></script>

    <!-- Load Game Script as a Module -->
    <script type="module" src="game.js"></script>
</body>
</html>
