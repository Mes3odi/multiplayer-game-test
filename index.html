<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Firebase Multiplayer Test with Chat</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100vh;
            background: #111;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #info {
            margin-bottom: 5px;
            font-size: 13px;
            color: #aaa;
            text-align: center;
        }
        canvas {
            background: #222;
            border: 2px solid #555;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: block;
        }
        /* Chat Box Styling */
        #chat-container {
            width: 800px;
            margin-top: 10px;
            background: #1a1a1a;
            border: 2px solid #444;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            height: 120px;
        }
        #chat-messages {
            flex: 1;
            padding: 8px;
            overflow-y: auto;
            font-size: 12px;
            color: #ddd;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        #chat-form {
            display: flex;
            border-top: 1px solid #444;
        }
        #chat-input {
            flex: 1;
            background: #111;
            border: none;
            padding: 8px;
            color: #fff;
            font-size: 12px;
            outline: none;
        }
        #chat-send {
            background: #444;
            color: #fff;
            border: none;
            padding: 0 15px;
            cursor: pointer;
            font-weight: bold;
        }
        #chat-send:hover {
            background: #555;
        }
    </style>
</head>
<body>

    <div id="info">Use <b>WASD</b> or <b>Arrow Keys</b> to move. Chat messages are saved forever!</div>
    <canvas id="gameCanvas" width="800" height="480"></canvas>

    <!-- Chat Box UI -->
    <div id="chat-container">
        <div id="chat-messages"></div>
        <form id="chat-form">
            <input type="text" id="chat-input" placeholder="Type a permanent message..." autocomplete="off">
            <button type="submit" id="chat-send">Send</button>
        </form>
    </div>

    <!-- Load Game Script as a Module -->
    <script type="module" src="game.js"></script>
</body>
</html>
